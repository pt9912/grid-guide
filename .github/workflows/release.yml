# GridGuide Release-Workflow (MVP-Stub).
# Siehe ADR 0005 §2.2 und §2.4, Lastenheft GG-NFA-CICD-003,
# GG-NFA-INSTALL-002.
#
# Stub-Eigenschaften (V1-Reifegrad ist Folgearbeit):
#   - Trigger ausschliesslich `workflow_dispatch`. Auto-Trigger
#     auf Tag-Push (`v*.*.*`) bleibt fuer V1 reserviert, sobald
#     Signing-Secrets (Apple/Authenticode) verfuegbar sind.
#   - tauri-action ist auf den SHA von v0.6.2 gepinnt (vgl.
#     ADR 0005 §2.4). Dependabot/Renovate uebernimmt die Pflege
#     nach Trigger 014 (Tooling-Bot-Konfiguration, separater
#     Folge-ADR).
#   - Bundles sind im MVP unsigniert (vgl. ADR 0005 §2.5,
#     GG-NFA-INSTALL-002 V1).
#
# Spike-Vertrag (ADR 0005 §4) — diese drei Items werden mit dem
# ersten echten Release-Lauf abgehakt:
#   1. workflow_dispatch erzeugt einen Release-Entwurf mit drei
#      Bundles (Linux .AppImage/.deb, macOS .dmg, Windows .msi).
#   2. Test-Secret-Run zeigt im Log nur `***`, kein Klartext.
#   3. Fork-PR-Lauf meldet "Signing-Secrets nicht verfuegbar"
#      sichtbar, ohne den Workflow rot zu faerben.

name: release

on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Release-Tag (Format vX.Y.Z); wird fuer Release-Entwurf verwendet."
        required: true
        type: string

permissions:
  # Release-Entwurf braucht write auf contents.
  contents: write

jobs:
  release:
    name: release (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux }
          - { runner: macos-latest, platform: macos }
          - { runner: windows-latest, platform: windows }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: System packages (linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            file

      - name: Rust toolchain
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-all-crates: "true"

      - name: pnpm setup
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Node toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # SHA-Pin per ADR 0005 §2.4; menschenlesbare Version im
      # Kommentar. Beim Bump beide Stellen aktualisieren.
      - name: tauri-action
        uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing-Secrets sind plattformspezifisch und im MVP
          # nicht gesetzt (GG-NFA-INSTALL-002 V1). tauri-action
          # akzeptiert das und faellt auf unsignierte Bundles
          # zurueck.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag-name }}
          releaseName: "GridGuide ${{ inputs.tag-name }}"
          releaseDraft: true
          prerelease: false
          # tauri.conf.json liegt unter src-tauri/, tauri-action
          # erwartet den projectPath relativ zum Repo-Root.
          projectPath: src-tauri
