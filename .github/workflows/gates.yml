# GridGuide Quality-Gates-CI.
# Siehe ADR 0005 §2.2 und §2.3, Lastenheft GG-NFA-CICD-001..002.
#
# Ein Job pro Plattform; Linux ist Pflichtcheck (per Branch-
# Protection-Regel im UI als Required markiert), macOS und Windows
# laufen Best-Effort. Der Workflow fuehrt `make gates` aus — das
# ist die kanonische Aggregations-Tuer aus ADR 0004; die CI
# wiederholt nicht, was das Makefile bereits kapselt.
#
# Toolchain-Versionen sind hier nicht im Workflow gepinnt, weil
# die kanonischen Pins im Dockerfile und in rust-toolchain.toml
# liegen (Single Source of Truth, vgl. ADR 0004 §2.5). Der
# Workflow setzt die jeweilige Plattform-spezifische Variante
# (rustup liest rust-toolchain.toml; corepack pickt
# packageManager aus frontend/package.json).

name: gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Bewusst minimale Permissions; Workflow schreibt nichts ins Repo.
permissions:
  contents: read

jobs:
  gates:
    name: gates (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, platform: linux }
          - { runner: macos-latest, platform: macos }
          - { runner: windows-latest, platform: windows }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plattform-spezifische Systempakete. Linux braucht die
      # Tauri-2.x-Webkit-Stack-Header (gleiche Liste wie Dockerfile
      # system-deps-Stage). macOS-Xcode-CLT ist auf macos-latest
      # bereits vorinstalliert; Windows-Visual-C++-Build-Tools sind
      # auf windows-latest ebenso vorinstalliert (kein expliziter
      # Schritt noetig).
      - name: System packages (linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            file

      # rustup respektiert rust-toolchain.toml automatisch; `rustup
      # show` triggert den Toolchain-Download und macht den State
      # im Workflow-Log sichtbar.
      - name: Rust toolchain
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # llvm-tools-preview + die cargo-* Tools liegen unter
          # ~/.cargo/bin; cache-all-crates sorgt dafuer, dass das
          # zwischen Laufen ueberlebt.
          cache-all-crates: "true"

      # pnpm-Setup VOR setup-node, weil setup-node mit cache=pnpm
      # ein bereits installiertes pnpm erwartet. Version wird aus
      # frontend/package.json (packageManager) gelesen.
      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Node toolchain
        uses: actions/setup-node@v4
        with:
          # Muss synchron zum Dockerfile-ARG NODE_VERSION bleiben.
          # Wenn das Dockerfile bumpt, hier mitziehen.
          node-version: 24.16.0
          # cache: pnpm braucht pnpm-lock.yaml; wir geben den Pfad
          # explizit an, weil das Lockfile unter frontend/ liegt.
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # cargo-* Tools, deren Versionen kanonisch im Dockerfile
      # liegen. `cargo install --locked --version X.Y.Z` ist
      # idempotent — bei Cache-Hit ein No-Op, sonst Build.
      - name: cargo tools
        run: |
          cargo install --locked --version 0.8.7 cargo-llvm-cov
          cargo install --locked --version 0.22.1 cargo-audit
          cargo install --locked --version 0.17.0 cargo-modules
          cargo install --locked --version 2.11.2 tauri-cli
          rustup component add llvm-tools-preview

      - name: make gates
        run: make gates

      # Coverage-Reports nur vom Linux-Pflichtjob hochladen.
      # macOS/Windows-Reports unterscheiden sich kaum und wuerden
      # nur Artefakt-Rauschen erzeugen.
      - name: Upload coverage
        if: matrix.platform == 'linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.platform }}
          path: |
            .coverage/
            frontend/coverage/
          if-no-files-found: warn
          retention-days: 14
